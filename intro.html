<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>CJajlkPulse — Intro</title>
  <style>
    html,body{height:100%;margin:0;font-family:Segoe UI,Arial,Helvetica,sans-serif;background:#0b0b0c;color:#fff}
    .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center}
    img.menu{max-width:90%;height:auto;display:block;margin-bottom:24px;box-shadow:0 8px 30px rgba(0,0,0,.6);border-radius:8px}
    .actions{display:flex;gap:12px}
    a.btn{display:inline-block;padding:12px 22px;background:#9b6cff;color:#fff;text-decoration:none;border-radius:8px;font-weight:600;box-shadow:0 6px 18px rgba(155,108,255,0.18)}
    a.btn.secondary{background:transparent;border:1px solid rgba(155,108,255,0.18)}
    footer{position:fixed;left:12px;bottom:12px;color:#bfb8ff;font-size:13px}
  </style>
</head>
<body>
  <div class="wrap">
    <img class="menu" src="assets/menu.png" alt="CJajlkPulse Menu" />

    <div class="actions">
      <a class="btn" href="index.html">Jouer</a>
      <a class="btn secondary" href="#" id="credits">Crédits</a>
    </div>
  </div>

  <footer>Appuyez sur <strong>Jouer</strong> pour lancer le jeu.</footer>

  <script>
    // Small UX: if user presses Enter, follow Play link
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') location.href = 'index.html';
    });
    document.getElementById('credits').addEventListener('click', e=>{
      e.preventDefault();
      alert('CJajlkPulse — Prototype\nEngine: CJajlkEngine');
    });
  </script>
</body>
</html>
